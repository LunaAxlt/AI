<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуны</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }

        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        canvas {
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.6));
            transition: filter 0.3s;
        }

        canvas.spinning {
            filter: drop-shadow(0 10px 30px rgba(255, 215, 0, 0.4));
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 45px solid #ffd700;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.5));
            z-index: 10;
        }

        .question-area {
            margin-top: 30px;
        }

        .question-input {
            width: 400px;
            max-width: 90vw;
            padding: 15px 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .question-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .question-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            display: block;
            margin: 20px auto;
            padding: 15px 60px;
            font-size: 20px;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 20px;
            font-size: 28px;
            color: #ffd700;
            min-height: 40px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            transition: all 0.3s;
        }

        .history {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            max-height: 100px;
            overflow-y: auto;
        }

        .history span {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            padding: 3px 10px;
            border-radius: 15px;
            margin: 2px;
            color: #ffd700;
        }

        .sectors-info {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 Колесо фортуны</h1>

        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheel" width="450" height="450"></canvas>
        </div>

        <div class="question-area">
            <input 
                type="text" 
                class="question-input" 
                id="questionInput" 
                placeholder="Задайте вопрос судьбе..."
                maxlength="80"
            >
        </div>

        <button class="btn" id="spinBtn">🎯 Крутить</button>

        <div class="result" id="result"></div>
        <div class="history" id="history"></div>
        <div class="sectors-info">
            <span>Секторов: 8</span>
            <span>Диапазон: 1–8</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const questionInput = document.getElementById('questionInput');
        const resultDiv = document.getElementById('result');
        const historyDiv = document.getElementById('history');

        const sectors = [1, 2, 3, 4, 5, 6, 7, 8];
        const colors = [
            '#e74c3c', '#f39c12', '#2ecc71', '#3498db',
            '#9b59b6', '#1abc9c', '#e67e22', '#e91e63'
        ];

        // Начальный угол: ставим сектор 8 по центру между 8 и 1 сверху
        // Указатель сверху (0 градусов = верх холста)
        let currentAngle = -Math.PI / sectors.length;
        let isSpinning = false;
        let spinHistory = [];

        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 190;
            const arcSize = (2 * Math.PI) / sectors.length;

            // Рисуем сектора
            sectors.forEach((num, i) => {
                const startAngle = angle + i * arcSize;
                const endAngle = startAngle + arcSize;

                // Градиент для сектора
                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                gradient.addColorStop(0, lightenColor(colors[i], 30));
                gradient.addColorStop(1, colors[i]);

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Текст номера
                const textAngle = startAngle + arcSize / 2;
                const textX = centerX + Math.cos(textAngle) * (radius * 0.65);
                const textY = centerY + Math.sin(textAngle) * (radius * 0.65);

                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(textAngle + Math.PI / 2);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px "Segoe UI", Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.fillText(num, 0, 0);
                ctx.restore();
            });

            // Центральный круг
            const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 45);
            centerGradient.addColorStop(0, '#ffd700');
            centerGradient.addColorStop(1, '#b8860b');

            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = centerGradient;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Внешнее кольцо
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 5, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function lightenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return `rgb(${R}, ${G}, ${B})`;
        }

        function getSectorFromAngle(angle) {
            // Нормализуем угол
            let normalizedAngle = angle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

            const arcSize = (2 * Math.PI) / sectors.length;
            // Указатель сверху, верх холста соответствует углу -PI/2 в стандартной системе
            // Переводим: угол 0 в нашей системе = верх холста
            const pointerAngle = (normalizedAngle + Math.PI / 2) % (2 * Math.PI);
            const sectorIndex = Math.floor(pointerAngle / arcSize);
            return sectors[sectorIndex % sectors.length];
        }

        function spin() {
            if (isSpinning) return;

            const question = questionInput.value.trim();
            if (!question) {
                questionInput.style.borderColor = '#e74c3c';
                questionInput.placeholder = 'Сначала задайте вопрос!';
                setTimeout(() => {
                    questionInput.style.borderColor = 'rgba(255, 215, 0, 0.3)';
                    questionInput.placeholder = 'Задайте вопрос судьбе...';
                }, 1500);
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            canvas.classList.add('spinning');
            resultDiv.textContent = 'Крутим...';

            // Выбираем ТОЛЬКО 1 или 2
            const fakeResult = Math.random() < 0.5 ? 1 : 2;

            const arcSize = (2 * Math.PI) / sectors.length;
            const targetIndex = sectors.indexOf(fakeResult);

            // Указатель сверху, нам нужен сектор targetIndex под указателем
            // Сектор i занимает углы от i*arcSize до (i+1)*arcSize относительно currentAngle
            // Указатель сверху — это угол -PI/2 в стандартной системе
            // Чтобы сектор targetIndex был сверху, нужно:
            // Центр сектора targetIndex: targetIndex * arcSize + arcSize / 2
            // Должен быть наверху: -PI/2 + 2*PI*k
            // То есть currentAngle + (targetIndex * arcSize + arcSize / 2) = -PI/2 + 2*PI*k
            // currentAngle = -PI/2 - (targetIndex * arcSize + arcSize / 2) + 2*PI*k

            let targetAngle = -Math.PI / 2 - (targetIndex * arcSize + arcSize / 2);
            // Приводим к диапазону [0, 2*PI)
            targetAngle = ((targetAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

            // Сколько нужно довернуть от текущего угла
            let currentNorm = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            let delta = targetAngle - currentNorm;
            if (delta < 0) delta += 2 * Math.PI;

            // Добавляем несколько полных оборотов
            const fullSpins = (5 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
            const finalAngle = currentAngle + fullSpins + delta;

            const duration = 4000 + Math.random() * 2000;
            const startTime = performance.now();
            const startAngle = currentAngle;

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Замедление в конце (ease-out)
                const eased = 1 - Math.pow(1 - progress, 3);
                currentAngle = startAngle + (finalAngle - startAngle) * eased;

                drawWheel(currentAngle);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Готово
                    canvas.classList.remove('spinning');
                    isSpinning = false;
                    spinBtn.disabled = false;

                    const sector = getSectorFromAngle(currentAngle);
                    resultDiv.textContent = `Выпало: ${sector}`;

                    // История
                    spinHistory.unshift({
                        question: question,
                        result: sector,
                        time: new Date().toLocaleTimeString()
                    });
                    if (spinHistory.length > 10) spinHistory.pop();

                    updateHistory();
                }
            }

            requestAnimationFrame(animate);
        }

        function updateHistory() {
            historyDiv.innerHTML = spinHistory
                .map(h => `<span>«${h.question.substring(0, 25)}${h.question.length > 25 ? '...' : ''}» → ${h.result}</span>`)
                .join(' ');
        }

        spinBtn.addEventListener('click', spin);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') spin();
        });

        // Начальная отрисовка
        drawWheel(currentAngle);
    </script>
</body>
</html>
