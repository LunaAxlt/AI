<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lavender Messenger</title>
    <style>
        body { background: #e6e6fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(150, 130, 180, 0.3); overflow: hidden; }
        #header { background: #967bb6; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #messages { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .mine { background: #d1b3ff; align-self: flex-end; }
        .theirs { background: #f0f0f0; align-self: flex-start; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #967bb6; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">Lavender</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="messageInput" placeholder="Напишите сообщение...">
            <button onclick="sendMessage()">📎</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (input.value) {
                socket.emit('chat message', input.value);
                addMessage(input.value, 'mine');
                input.value = '';
            }
        }

        socket.on('chat message', (msg) => {
            addMessage(msg, 'theirs');
        });

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
